services:
  web:
    build:
      context: .
    image: project-django:local
    container_name: project-web
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-only-please-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      POSTGRES_DB: ${POSTGRES_DB:-devops}
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devops}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    expose:
      - "8000"
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: project-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devops}
      POSTGRES_USER: ${POSTGRES_USER:-devops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devops} -d ${POSTGRES_DB:-devops}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
